name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run black
      run: black --check src/ tests/ scripts/
    
    - name: Run ruff
      run: ruff check src/ tests/ scripts/
    
    - name: Run mypy
      run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tests
      run: pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  smoke-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Run smoke test
      run: |
        python -c "
        from src.train.pipeline import EnsemblePipeline
        from omegaconf import OmegaConf
        
        config = {
            'random_state': 42,
            'task_type': 'classification',
            'dataset': {'name': 'iris'},
            'data_split': {'test_size': 0.2, 'val_size': 0.0},
            'preprocessing': {'scaling': 'standard'},
            'ensembles': {
                'voting': {'enabled': True},
                'stacking': {'enabled': False},
                'bagging': {'enabled': False},
                'dynamic_selection': {'enabled': False},
                'meta_learning': {'enabled': False}
            },
            'evaluation': {'primary_metric': 'accuracy'}
        }
        
        config = OmegaConf.create(config)
        pipeline = EnsemblePipeline(config)
        results = pipeline.run_experiment()
        print(f'Smoke test passed! Best model: {results[\"best_model\"]}')
        "
